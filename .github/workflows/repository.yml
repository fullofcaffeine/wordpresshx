name: Repository bootstrap

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repository:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate bootstrap repository
        run: bash scripts/check-repository.sh

  wp70-source:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Verify exact WordPress 7.0 source and distribution
        run: python3 scripts/profiles/verify-wp70-release.py

  gutenberg-forward-source:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Verify exact Gutenberg 23.4 forward source and release
        run: python3 scripts/profiles/verify-gutenberg-forward-23-4.py

  profile-generator:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Regenerate exact catalogs twice and compare committed bytes
        run: bash scripts/profiles/test-catalog-generator.sh

  profile-diff:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate exact-profile diff JSON and human goldens
        run: python3 scripts/profiles/test-profile-diff.py

  release-governance:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Rehearse issue, security, release, and rollback decisions
        run: python3 scripts/release/test-governance.py

  license-policy:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Prove the provisional license inventory and blocked publication gate
        run: python3 scripts/licenses/test-license-policy.py

  wordpress-runtime:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Haxe 4.3.7
        uses: krdlab/setup-haxe@d93667502be3b4f31a94a3308a74388f2e178a8d # v2.1.0
        with:
          haxe-version: 4.3.7
      - name: Install Haxe Formatter 1.18.0
        run: haxelib install formatter 1.18.0 --quiet
      - name: Validate immutable container inputs
        run: python3 scripts/docker/check-image-lock.py
      - name: Generate the native public PHP plugin fixture
        run: bash compiler/wordpress/scripts/test.sh
      - name: Discover and activate the plugin on real WordPress 7.0
        run: bash compiler/wordpress/scripts/test-wordpress.sh
      - name: Install exact scoped browser asset toolchain
        run: |
          npm install --global lix@15.12.4
          lix install haxe 4.3.7 --global
          haxelib install formatter 1.18.0 --quiet
      - name: Prove official assets, handles, enqueue order, and translations
        run: bash packages/gutenberg/scripts/test-assets.sh

  security:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out complete repository history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install checksum-pinned Gitleaks
        run: |
          bash scripts/ci/install-gitleaks.sh --install-dir "$RUNNER_TEMP/bin"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
      - name: Validate security policy
        run: bash scripts/ci/check-security-tooling.sh
      - name: Scan complete Git history
        run: bash scripts/security/run-gitleaks.sh
      - name: Reject machine-local paths
        run: bash scripts/security/run-local-path-audit.sh

  haxe:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Haxe 4.3.7
        uses: krdlab/setup-haxe@d93667502be3b4f31a94a3308a74388f2e178a8d # v2.1.0
        with:
          haxe-version: 4.3.7
      - name: Install Haxe Formatter 1.18.0
        run: haxelib install formatter 1.18.0 --quiet
      - name: Check Haxe formatting
        run: bash scripts/lint/hx-format-guard.sh
      - name: Test exact profile Haxe contracts and compile failures
        run: bash scripts/profiles/test-profile-haxe.sh
      - name: Test generic PHP compiler package
        run: bash compiler/reflaxe.php/scripts/test.sh
      - name: Test exact PHP 7.4 and 8.4 runtime matrix
        run: bash compiler/reflaxe.php/scripts/test-php-matrix.sh
      - name: Test WordPress public PHP profile
        run: bash compiler/wordpress/scripts/test.sh
      - name: Test public PHP on exact PHP 7.4 and 8.4
        run: bash compiler/wordpress/scripts/test-php-matrix.sh
      - name: Install exact scoped HXX toolchain
        run: |
          npm install --global lix@15.12.4
          lix install haxe 4.3.7 --global
          haxelib install formatter 1.18.0 --quiet
      - name: Test Haxe and Genes PHP trace CLI
        run: bash packages/cli/scripts/test.sh
      - name: Test typed compile-time HXX parser prototype
        run: bash packages/hxx/scripts/test.sh
      - name: Test strict Gutenberg browser compiler profile
        run: bash packages/gutenberg/scripts/test.sh
      - name: Test typed React and Gutenberg HXX
        run: bash packages/gutenberg/scripts/test-hxx.sh

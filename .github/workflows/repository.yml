name: Repository bootstrap

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  repository:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate bootstrap repository
        run: bash scripts/check-repository.sh

  semantic-plan:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Haxe 4.3.7
        uses: krdlab/setup-haxe@d93667502be3b4f31a94a3308a74388f2e178a8d # v2.1.0
        with:
          haxe-version: 4.3.7
      - name: Validate canonical semantic plan and staged emitter result
        run: bash scripts/semantic-plan/test.sh
      - name: Compile and validate the semantic macro collector
        run: bash scripts/semantic-collector/test.sh

  contract-schema:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install exact project Node runtime
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.17.0
          package-manager-cache: false
      - name: Install Haxe 4.3.7
        uses: krdlab/setup-haxe@d93667502be3b4f31a94a3308a74388f2e178a8d # v2.1.0
        with:
          haxe-version: 4.3.7
      - name: Install exact Haxe, formatter, Genes, and TypeScript dependencies
        run: |
          npm install --global lix@15.12.4
          lix install haxe 4.3.7 --global
          haxelib install formatter 1.18.0 --quiet
          npm --prefix packages/gutenberg/build-tooling ci --ignore-scripts --no-audit --no-fund
      - name: Test typed schema and codec authority across Haxe, Genes, and PHP
        run: bash scripts/contracts/test-schema-authority.sh

  wp70-source:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Verify exact WordPress 7.0 source and distribution
        run: python3 scripts/profiles/verify-wp70-release.py

  gutenberg-forward-source:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Verify exact Gutenberg 23.4 forward source and release
        run: python3 scripts/profiles/verify-gutenberg-forward-23-4.py

  profile-generator:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Regenerate exact catalogs twice and compare committed bytes
        run: bash scripts/profiles/test-catalog-generator.sh

  profile-diff:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate exact-profile diff JSON and human goldens
        run: python3 scripts/profiles/test-profile-diff.py

  release-governance:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Rehearse issue, security, release, and rollback decisions
        run: python3 scripts/release/test-governance.py

  generated-output-vcs:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate generated-output VCS and clean release replay policy
        run: python3 scripts/generated-output-vcs/test-policy.py

  license-policy:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Prove the provisional license inventory and blocked publication gate
        run: python3 scripts/licenses/test-license-policy.py

  wordpress-runtime:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Haxe 4.3.7
        uses: krdlab/setup-haxe@d93667502be3b4f31a94a3308a74388f2e178a8d # v2.1.0
        with:
          haxe-version: 4.3.7
      - name: Install Haxe Formatter 1.18.0
        run: haxelib install formatter 1.18.0 --quiet
      - name: Validate immutable container inputs
        run: python3 scripts/docker/check-image-lock.py
      - name: Generate the native public PHP plugin fixture
        run: bash compiler/wordpress/scripts/test.sh
      - name: Discover and activate the plugin on real WordPress 7.0
        run: bash compiler/wordpress/scripts/test-wordpress.sh
      - name: Prove dependency-closed private runtime coexistence on WordPress 7.0
        run: bash scripts/runtime-support/test-wordpress.sh
      - name: Install exact scoped browser asset toolchain
        run: |
          npm install --global lix@15.12.4
          lix install haxe 4.3.7 --global
          haxelib install formatter 1.18.0 --quiet
      - name: Prove official assets, handles, enqueue order, and translations
        run: bash packages/gutenberg/scripts/test-assets.sh

  security:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out complete repository history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install checksum-pinned Gitleaks
        run: |
          bash scripts/ci/install-gitleaks.sh --install-dir "$RUNNER_TEMP/bin"
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"
      - name: Validate security policy
        run: bash scripts/ci/check-security-tooling.sh
      - name: Scan complete Git history
        run: bash scripts/security/run-gitleaks.sh
      - name: Reject machine-local paths
        run: bash scripts/security/run-local-path-audit.sh

  haxe:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install exact project Node runtime
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.17.0
          package-manager-cache: false
      - name: Install Haxe 4.3.7
        uses: krdlab/setup-haxe@d93667502be3b4f31a94a3308a74388f2e178a8d # v2.1.0
        with:
          haxe-version: 4.3.7
      - name: Install Haxe Formatter 1.18.0
        run: haxelib install formatter 1.18.0 --quiet
      - name: Check Haxe formatting
        run: bash scripts/lint/hx-format-guard.sh
      - name: Type the ADR-016 Haxe-only project contract
        working-directory: fixtures/project-cli/project
        run: haxe .wphx/bootstrap/project.hxml
      - name: Test exact profile Haxe contracts and compile failures
        run: bash scripts/profiles/test-profile-haxe.sh
      - name: Test generic PHP compiler package
        run: bash compiler/reflaxe.php/scripts/test.sh
      - name: Test clean standalone PHP compiler package artifact
        run: bash compiler/reflaxe.php/scripts/test-package.sh --require-clean
      - name: Test exact PHP 7.4 and 8.4 runtime matrix
        run: bash compiler/reflaxe.php/scripts/test-php-matrix.sh
      - name: Test WordPress public PHP profile
        run: bash compiler/wordpress/scripts/test.sh
      - name: Test public PHP on exact PHP 7.4 and 8.4
        run: bash compiler/wordpress/scripts/test-php-matrix.sh
      - name: Install exact generated-PHP quality toolchain
        run: bash scripts/php-quality/install.sh
      - name: Test pinned generated-PHP quality policy
        run: bash scripts/php-quality/test-production.sh
      - name: Test dependency-closed private PHP runtime packaging
        run: |
          bash scripts/runtime-support/test.sh
          bash scripts/runtime-support/test-php-matrix.sh
      - name: Install exact scoped HXX toolchain
        run: |
          npm install --global lix@15.12.4
          lix install haxe 4.3.7 --global
          haxelib install formatter 1.18.0 --quiet
      - name: Test Haxe and Genes PHP trace CLI
        run: bash packages/cli/scripts/test.sh
      - name: Test fail-closed generated-file ownership transaction
        run: bash scripts/ownership/test.sh
      - name: Test production project CLI foundation
        run: bash scripts/project-cli/test-production.sh
      - name: Test Haxe-first site scaffolding
        run: bash scripts/scaffold/test-production.sh
      - name: Test production compile and watch development loop
        run: bash scripts/dev-loop/test-production.sh
      - name: Test deterministic build and unsigned archive replay
        run: bash scripts/determinism/test-production.sh
      - name: Test real browser source-map composition and trace CLI
        run: bash packages/cli/scripts/test-browser-source-correlation.sh
      - name: Test typed compile-time HXX parser prototype
        run: bash packages/hxx/scripts/test.sh
      - name: Test strict Gutenberg browser compiler profile
        run: bash packages/gutenberg/scripts/test.sh
      - name: Test typed React and Gutenberg HXX
        run: bash packages/gutenberg/scripts/test-hxx.sh
      - name: Test strict and classic Genes React differential
        run: bash packages/gutenberg/scripts/test-differential.sh

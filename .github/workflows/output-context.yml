name: Output-context safety

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  output-context:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install exact project Node runtime
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22.17.0
          package-manager-cache: false
      - name: Install Haxe 4.3.7
        uses: krdlab/setup-haxe@d93667502be3b4f31a94a3308a74388f2e178a8d # v2.1.0
        with:
          haxe-version: 4.3.7
      - name: Install exact Haxe, formatter, Genes, and TypeScript dependencies
        run: |
          npm install --global lix@15.12.4
          lix install haxe 4.3.7 --global
          haxelib install formatter 1.18.0 --quiet
          npm --prefix packages/gutenberg/build-tooling ci --ignore-scripts --no-audit --no-fund
      - name: Prove output contexts across Haxe, Genes, PHP, React, and WordPress
        run: bash scripts/output-context/test.sh
